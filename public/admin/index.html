<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin LCET</title>
</head>
<body>
  <!-- Utiliser une version spécifique et stable -->
  <script src="https://unpkg.com/decap-cms@2.10.0/dist/decap-cms.js"></script>
  <script>
    // Attendre que la page soit chargée
    document.addEventListener('DOMContentLoaded', function() {
      // Vérifier que CMS est disponible
      if (typeof window.CMS !== 'undefined') {
        try {
          window.CMS.init();
          console.log('✅ Decap CMS initialisé avec config.yml');
        } catch (error) {
          console.error('❌ Erreur:', error);
        }
      } else {
        console.error('❌ Decap CMS non chargé');
      }
    });
  </script>
</body>
</html>
